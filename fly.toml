app = "dewo-trading"
primary_region = "sin"

[build]

[env]
  DATA_DIR = "/data"

[[mounts]]
  source = "trading_data"
  destination = "/data"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[checks]
  [checks.health]
    port = 8501
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "get"
    path = "/_stcore/health"
